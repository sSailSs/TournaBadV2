name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      INFISICAL_IDENTITY_ID: ${{ secrets.INFISICAL_IDENTITY_ID }}
      INFISICAL_PROJECT_SLUG: ${{ secrets.INFISICAL_PROJECT_SLUG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run lint
        run: composer lint

      - name: Run tests
        run: composer test

      - name: Fetch staging secrets from Infisical
        if: env.INFISICAL_IDENTITY_ID != '' && env.INFISICAL_PROJECT_SLUG != ''
        continue-on-error: true
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: staging

      - name: Validate Infisical staging env
        if: env.INFISICAL_IDENTITY_ID != '' && env.INFISICAL_PROJECT_SLUG != '' && env.APP_ENV != ''
        run: |
          test -n "$APP_ENV"
          test "$APP_ENV" = "staging"

      - name: SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
