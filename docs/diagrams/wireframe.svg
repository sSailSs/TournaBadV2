<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #eef2f7; }
      .screen { fill: #ffffff; stroke: #c8d2e0; stroke-width: 2; }
      .topbar { fill: #f8fafc; stroke: #d8e0ec; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #d8e0ec; stroke-width: 1.5; }
      .line { stroke: #a9b6c8; stroke-width: 2; }
      .muted { fill: #667085; font: 18px Segoe UI, Arial, sans-serif; }
      .text { fill: #142033; font: 20px Segoe UI, Arial, sans-serif; }
      .title { fill: #142033; font: 700 26px Segoe UI, Arial, sans-serif; }
      .small { fill: #667085; font: 15px Segoe UI, Arial, sans-serif; }
      .label { fill: #142033; font: 700 18px Segoe UI, Arial, sans-serif; }
      .button { fill: #0f766e; }
      .buttonText { fill: #ffffff; font: 700 16px Segoe UI, Arial, sans-serif; }
      .outline { fill: #ffffff; stroke: #b7c3d4; stroke-width: 1.5; }
      .accent { fill: #f59e0b; }
      .brand { fill: #0f766e; font: 800 21px Segoe UI, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <text class="title" x="60" y="58">TournaBad - Wireframe simplifie</text>
  <text class="muted" x="60" y="88">Parcours principal : liste des tournois, creation, puis gestion d'un tournoi</text>

  <!-- Screen 1 -->
  <rect class="screen" x="60" y="130" width="395" height="640" rx="18"/>
  <rect class="topbar" x="60" y="130" width="395" height="58" rx="18"/>
  <circle class="accent" cx="88" cy="160" r="8"/>
  <text class="brand" x="106" y="167">TournaBad</text>
  <text class="small" x="330" y="166">Compte</text>

  <text class="title" x="90" y="235">Mes tournois</text>
  <text class="small" x="90" y="263">Voir et ouvrir ses tournois</text>
  <rect class="button" x="285" y="220" width="135" height="40" rx="20"/>
  <text class="buttonText" x="307" y="246">Creer</text>

  <rect class="card" x="90" y="300" width="330" height="395" rx="10"/>
  <text class="label" x="115" y="335">Tableau des tournois</text>
  <line class="line" x1="115" y1="360" x2="395" y2="360"/>
  <text class="small" x="115" y="392">Nom</text>
  <text class="small" x="220" y="392">Mode</text>
  <text class="small" x="310" y="392">Action</text>
  <line class="line" x1="115" y1="410" x2="395" y2="410"/>

  <rect class="outline" x="115" y="435" width="280" height="58" rx="8"/>
  <text class="text" x="132" y="471">Tournoi avril</text>
  <rect class="outline" x="315" y="449" width="58" height="28" rx="14"/>
  <text class="small" x="329" y="468">Detail</text>

  <rect class="outline" x="115" y="515" width="280" height="58" rx="8"/>
  <text class="text" x="132" y="551">Bad du soir</text>
  <rect class="outline" x="315" y="529" width="58" height="28" rx="14"/>
  <text class="small" x="329" y="548">Detail</text>

  <rect class="outline" x="115" y="595" width="280" height="58" rx="8"/>
  <text class="text" x="132" y="631">Equipe club</text>
  <rect class="outline" x="315" y="609" width="58" height="28" rx="14"/>
  <text class="small" x="329" y="628">Detail</text>

  <!-- Screen 2 -->
  <rect class="screen" x="522" y="130" width="395" height="640" rx="18"/>
  <rect class="topbar" x="522" y="130" width="395" height="58" rx="18"/>
  <circle class="accent" cx="550" cy="160" r="8"/>
  <text class="brand" x="568" y="167">TournaBad</text>
  <text class="small" x="778" y="166">Annuler</text>

  <text class="title" x="552" y="235">Creer un tournoi</text>
  <text class="small" x="552" y="263">Renseigner les informations de base</text>

  <rect class="card" x="552" y="300" width="335" height="405" rx="10"/>
  <text class="label" x="577" y="335">Formulaire</text>

  <text class="small" x="577" y="378">Nom du tournoi</text>
  <rect class="outline" x="577" y="390" width="285" height="38" rx="7"/>

  <text class="small" x="577" y="462">Date</text>
  <rect class="outline" x="577" y="474" width="130" height="38" rx="7"/>
  <text class="small" x="730" y="462">Terrains</text>
  <rect class="outline" x="730" y="474" width="132" height="38" rx="7"/>

  <text class="small" x="577" y="546">Duree d'un tour</text>
  <rect class="outline" x="577" y="558" width="130" height="38" rx="7"/>
  <text class="small" x="730" y="546">Mode</text>
  <rect class="outline" x="730" y="558" width="132" height="38" rx="7"/>
  <text class="small" x="748" y="582">2 vs 2</text>

  <rect class="button" x="577" y="640" width="160" height="42" rx="21"/>
  <text class="buttonText" x="606" y="667">Creer le tournoi</text>
  <rect class="outline" x="750" y="640" width="112" height="42" rx="21"/>
  <text class="small" x="780" y="666">Annuler</text>

  <!-- Screen 3 -->
  <rect class="screen" x="984" y="130" width="395" height="640" rx="18"/>
  <rect class="topbar" x="984" y="130" width="395" height="58" rx="18"/>
  <circle class="accent" cx="1012" cy="160" r="8"/>
  <text class="brand" x="1030" y="167">TournaBad</text>
  <text class="small" x="1235" y="166">Compte</text>

  <text class="title" x="1014" y="235">Detail du tournoi</text>
  <text class="small" x="1014" y="263">Mode, date, statut et actions</text>

  <rect class="card" x="1014" y="292" width="335" height="88" rx="10"/>
  <text class="label" x="1038" y="325">Tournoi avril</text>
  <text class="small" x="1038" y="353">2 vs 2 | 12 min | 4 terrains</text>

  <rect class="outline" x="1014" y="400" width="75" height="34" rx="17"/>
  <text class="small" x="1030" y="422">Joueurs</text>
  <rect class="outline" x="1100" y="400" width="80" height="34" rx="17"/>
  <text class="small" x="1118" y="422">Points</text>
  <rect class="outline" x="1190" y="400" width="105" height="34" rx="17"/>
  <text class="small" x="1205" y="422">Parametres</text>

  <rect class="card" x="1014" y="462" width="100" height="74" rx="10"/>
  <text class="label" x="1048" y="494">4</text>
  <text class="small" x="1033" y="519">Terrains</text>
  <rect class="card" x="1130" y="462" width="100" height="74" rx="10"/>
  <text class="label" x="1160" y="494">12</text>
  <text class="small" x="1151" y="519">Minutes</text>
  <rect class="card" x="1246" y="462" width="103" height="74" rx="10"/>
  <text class="label" x="1281" y="494">18</text>
  <text class="small" x="1265" y="519">Joueurs</text>

  <rect class="card" x="1014" y="562" width="335" height="135" rx="10"/>
  <text class="label" x="1038" y="595">Generation du tour</text>
  <rect class="button" x="1038" y="615" width="190" height="40" rx="20"/>
  <text class="buttonText" x="1062" y="641">Generer le tour</text>
  <text class="small" x="1038" y="680">Terrain 1 : Equipe 1 vs Equipe 2</text>

  <!-- Flow arrows -->
  <line class="line" x1="455" y1="450" x2="522" y2="450"/>
  <polygon fill="#a9b6c8" points="522,450 508,442 508,458"/>
  <text class="small" x="463" y="432">Creer</text>

  <line class="line" x1="917" y1="450" x2="984" y2="450"/>
  <polygon fill="#a9b6c8" points="984,450 970,442 970,458"/>
  <text class="small" x="925" y="432">Valider</text>
</svg>
